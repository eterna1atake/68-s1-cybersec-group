services:
  s1db:
    image: postgres:latest
    container_name: 68-s1-database
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - s1_network
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data: